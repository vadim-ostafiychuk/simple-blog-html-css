<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SimpleBlog</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="./css/reset.css" />
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <div class="wrapper">
      <header class="header">
        <div class="container">
          <div class="header_content">
            <a href="/" class="logo"> SimpleBlog </a>

            <div class="header-right-panel">
              <nav class="nav">
                <ul class="nav_list">
                  <li class="nav_item">
                    <a href="/" class="nav_link">Home</a>
                  </li>
                  <li class="nav_item">
                    <a href="/about" class="nav_link">About</a>
                  </li>
                </ul>
              </nav>
              <form class="search_form" action="">
                <input
                  type="text"
                  class="search_input"
                  placeholder="Search everything..."
                />

                <button class="search_btn">Search</button>
              </form>
            </div>
          </div>
        </div>
      </header>
      <main class="main">
        <div class="container">
          <div class="main_content">
            <section class="featured-posts">
              <h2>Featured</h2>
              <div class="featured-posts__items">
                <article class="post-card">
                  <img src="https://placehold.co/960x540" alt="" />
                  <p class="post-card__meta">
                    <time datetime="2026-06-05">2026-06-05</time>
                    <span>|</span>
                    <a href="">Gregoryy Ognovski</a>
                  </p>
                  <a href="">
                    <h3>Big featured post title</h3>
                  </a>
                </article>
                <article class="post-card">
                  <img src="./img/OMB-WTI-Hero-4_28_26-960x540.png" alt="" />
                  <p class="post-card__meta">
                    <time datetime="2026-06-05">2026-06-05</time>
                    <span>|</span>
                    <a href="">Gregoryy Ognovski</a>
                  </p>
                  <a href="">
                    <h3>How Frontier Firms are rebuilding the operating model for the age of AI</h3>
                  </a>
                </article>
              </div>
            </section>
          </div>
        </div>
      </main>
      <footer class="footer">
        <div class="container">
          <div class="footer-body">
            <p class="footer-text"><i class="bi bi-c-circle"></i>2026</p>
          </div>
        </div>
      </footer>
    </div>
  </body>
</html>
